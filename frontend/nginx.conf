server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React Router uses client-side routes (/tutor, /quiz, /planner, etc.).
    # Without this fallback, refreshing on any of those paths would 404
    # since no such file exists on disk -- only index.html + JS routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets can be cached aggressively; index.html should not be,
    # so browsers always pick up a new build's asset references.
    location ~* \.(?:js|css|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
